name: Gateway & Web CI

on:
  push:
    branches: [main, master]
    paths:
      - 'gateway/**'
      - 'web/**'
      - '.github/workflows/gateway-web.yml'
  pull_request:
    paths:
      - 'gateway/**'
      - 'web/**'
      - '.github/workflows/gateway-web.yml'

jobs:
  gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: gateway/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test -- --ci

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
