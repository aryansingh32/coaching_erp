# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  CoachingOS — Nginx Main Configuration                                      ║
# ║                                                                             ║
# ║  This is the main nginx.conf. Virtual host configs are in conf.d/.          ║
# ║                                                                             ║
# ║  Features:                                                                  ║
# ║    - Security headers (v3 Part 4: HSTS, CSP, X-Frame-Options, etc.)        ║
# ║    - Gzip compression for API responses and static assets                   ║
# ║    - WebSocket upgrade map for Socket.io (attendance, real-time)            ║
# ║    - server_tokens off (hide Nginx version)                                 ║
# ║    - SSL config with fallback to self-signed for development                ║
# ║    - Rate limiting zones (v3 Flaw A)                                        ║
# ║    - Proxy buffer tuning for large ERPNext responses                        ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# Run as the nginx user (Alpine default)
user  nginx;

# Auto-detect CPU cores for worker processes
worker_processes  auto;

# Error log level: warn in production, debug for troubleshooting
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# ─────────────────────────────────────────────────────────────────────────────
# EVENT PROCESSING
# ─────────────────────────────────────────────────────────────────────────────
events {
    # Max simultaneous connections per worker process
    # At 50 institutes × 200 students × 10% concurrent = ~1000 connections
    worker_connections  2048;

    # Use epoll on Linux for efficient event handling
    use epoll;

    # Accept multiple connections at once
    multi_accept on;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP BLOCK
# ─────────────────────────────────────────────────────────────────────────────
http {
    # ─── MIME Types ──────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────────────────
    # JSON-formatted access log for Promtail/Loki ingestion
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"upstream_response_time":"$upstream_response_time",'
            '"server_name":"$server_name"'
        '}';

    access_log  /var/log/nginx/access.log  json_combined;

    # ─── Performance ─────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Keepalive settings
    keepalive_timeout  65;
    keepalive_requests 100;

    # ─── Security: Hide Nginx version ────────────────────────────────────
    # Prevents attackers from targeting version-specific vulnerabilities
    server_tokens off;

    # ─── Security Headers (v3 Part 4) ────────────────────────────────────
    # HSTS: force HTTPS for 1 year, include subdomains, allow preload list
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent MIME-type sniffing attacks
    add_header X-Content-Type-Options "nosniff" always;

    # Clickjacking protection: allow framing only from same origin
    # (Metabase embeds use SAMEORIGIN — adjust if needed for cross-origin embedding)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # XSS protection (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy: send origin only for cross-origin requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy:
    #   - default-src 'self': only load resources from same origin
    #   - script-src 'self' 'unsafe-inline': Next.js requires inline scripts
    #   - frame-src: allow Metabase embed iframes from platform subdomains
    #   - img-src: allow images from self, data URIs, and MinIO/CDN
    #   - connect-src: allow API and WebSocket connections
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; frame-src 'self' https://*.coachingos.local; img-src 'self' data: blob:; connect-src 'self' wss://*.coachingos.local https://*.coachingos.local" always;

    # Permissions policy: disable unused browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ─── Gzip Compression ────────────────────────────────────────────────
    # Compress API responses and static assets to reduce bandwidth
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ─── WebSocket Upgrade Map ───────────────────────────────────────────
    # Required for Socket.io (attendance real-time dashboard)
    # Maps the Upgrade header to the Connection header value
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─── Rate Limiting Zones (v3 Flaw A) ─────────────────────────────────
    # IP-level rate limiting to prevent brute-force and DoS attacks
    #
    # api zone: general API requests — 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    #
    # auth zone: authentication endpoints — 5 requests/minute per IP
    # (prevents OTP enumeration attacks)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    #
    # webhook zone: payment webhooks — 10 requests/second per IP
    # (Razorpay can burst during settlement)
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=10r/s;

    # ─── Proxy Settings ──────────────────────────────────────────────────
    # Buffer settings for upstream responses
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # Timeout settings
    proxy_connect_timeout      30s;
    proxy_send_timeout         60s;
    proxy_read_timeout         60s;

    # Pass real client IP to upstream services
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host            $host;

    # ─── Client Body Size ────────────────────────────────────────────────
    # Allow large file uploads (video content, CSV bulk imports)
    client_max_body_size 100m;

    # ─── SSL Configuration ───────────────────────────────────────────────
    # Modern SSL settings for production
    # Uses self-signed certs for development (see ssl/.gitkeep)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (enable when using real certificates)
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ─── Include Virtual Host Configs ────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
