# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  CoachingOS — Nginx Virtual Host Configuration                              ║
# ║                                                                             ║
# ║  Routing:                                                                   ║
# ║    api.coachingos.local     → gateway:3000 (REST API + WebSocket)           ║
# ║    app.coachingos.local     → web:3001 (Next.js admin panel)                ║
# ║    *.coachingos.local       → web:3001 (tenant subdomain routing)           ║
# ║    ops.coachingos.local     → grafana:3000 (IP-restricted, ops only)        ║
# ║                                                                             ║
# ║  Rate Limiting (v3 Flaw A):                                                ║
# ║    /api/v1/auth/*   → 5 req/min  (OTP brute-force protection)              ║
# ║    /api/v1/*        → 30 req/sec (general API)                              ║
# ║    /api/v1/fees/webhook/* → 10 req/sec (Razorpay burst)                     ║
# ║                                                                             ║
# ║  SSL: Uses self-signed certs for dev. Replace with Let's Encrypt/Cloudflare ║
# ║  in production. Cert files expected at /etc/nginx/ssl/                       ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ─────────────────────────────────────────────────────────────────────────────
# UPSTREAM DEFINITIONS
# ─────────────────────────────────────────────────────────────────────────────

# NestJS Gateway — REST API and WebSocket
upstream gateway_upstream {
    server gateway:3000;
    # For horizontal scaling (v3 Part 4), add more instances:
    # server gateway-2:3000;
    keepalive 32;
}

# Next.js Web — Admin Panel and Tenant UI
upstream web_upstream {
    server web:3001;
    keepalive 16;
}

# Grafana — Internal observability dashboards
upstream grafana_upstream {
    server grafana:3000;
}


# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS REDIRECT
# ─────────────────────────────────────────────────────────────────────────────
# All HTTP traffic is redirected to HTTPS (301 permanent redirect).
# In development without SSL, comment out this block and use the HTTP servers below.
server {
    listen 80;
    server_name *.coachingos.local;

    # ACME challenge for Let's Encrypt cert renewal (production)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}


# ─────────────────────────────────────────────────────────────────────────────
# API SERVER: api.coachingos.local → Gateway
# ─────────────────────────────────────────────────────────────────────────────
# All REST API calls and WebSocket connections from clients.
# Rate limiting applied per endpoint category.
server {
    listen 443 ssl http2;
    listen 80;                          # Fallback for dev without SSL
    server_name api.coachingos.local;

    # ─── SSL Certificates ────────────────────────────────────────────────
    # Development: use self-signed certs (generate with infra/scripts/gen-selfsigned.sh)
    # Production: use Let's Encrypt or Cloudflare Origin certs
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ─── Auth Endpoints (strict rate limit — v3 Flaw A) ──────────────────
    # 5 OTP requests per minute per IP prevents phone number enumeration
    location /api/v1/auth/ {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ─── Payment Webhooks (moderate rate limit) ──────────────────────────
    # Razorpay can burst during settlement windows
    location /api/v1/fees/webhook/ {
        limit_req zone=webhook burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ─── WebSocket: Socket.io (attendance real-time, test timers) ────────
    # Socket.io uses long-polling fallback + WebSocket upgrade
    location /socket.io/ {
        proxy_pass http://gateway_upstream;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Longer timeouts for WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable buffering for real-time
        proxy_buffering off;
    }

    # ─── Health Check Endpoint (no rate limit) ───────────────────────────
    # Used by Docker healthcheck and monitoring
    location /api/v1/health {
        proxy_pass http://gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # No rate limit on health checks
    }

    # ─── General API (standard rate limit) ───────────────────────────────
    # 30 requests/second per IP with burst of 50
    location /api/v1/ {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # CORS headers for mobile apps and web frontend
        # The gateway also handles CORS, but Nginx adds them for preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-App-Version, X-Institute-Slug' always;
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # ─── Prometheus Metrics (internal only) ──────────────────────────────
    # Gateway exposes /metrics for Prometheus scraping
    # Block external access — only allow from Docker network
    location /metrics {
        allow 172.20.0.0/16;
        deny all;
        proxy_pass http://gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ─── Default: 404 for unmatched paths ────────────────────────────────
    location / {
        return 404 '{"error": "Not Found", "message": "API endpoint not found. All endpoints are under /api/v1/"}';
        add_header Content-Type application/json;
    }

    # ─── Error Pages ─────────────────────────────────────────────────────
    error_page 429 = @rate_limited;
    location @rate_limited {
        return 429 '{"error": "Too Many Requests", "message": "Rate limit exceeded. Please retry after a short delay."}';
        add_header Content-Type application/json always;
        add_header Retry-After 60 always;
    }
}


# ─────────────────────────────────────────────────────────────────────────────
# APP SERVER: app.coachingos.local → Next.js Web
# ─────────────────────────────────────────────────────────────────────────────
# Main admin panel for the platform (non-tenant-specific pages)
server {
    listen 443 ssl http2;
    listen 80;
    server_name app.coachingos.local;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Next.js app
    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Next.js hot module replacement (development only)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Next.js static assets (immutable cache)
    location /_next/static/ {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}


# ─────────────────────────────────────────────────────────────────────────────
# OPS SERVER: ops.coachingos.local → Grafana (IP-Restricted)
# ─────────────────────────────────────────────────────────────────────────────
# Internal observability dashboards — accessible ONLY from allowed IPs.
# In production, restrict to office IP ranges and VPN.
server {
    listen 443 ssl http2;
    listen 80;
    server_name ops.coachingos.local;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # IP restriction: only allow internal/office networks
    # Add your office IP range and VPN CIDR here
    allow 127.0.0.0/8;         # localhost
    allow 10.0.0.0/8;          # private network
    allow 172.16.0.0/12;       # Docker network + private
    allow 192.168.0.0/16;      # private network
    # allow YOUR_OFFICE_IP/32; # Add your office public IP
    deny all;

    location / {
        proxy_pass http://grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Grafana WebSocket for live dashboards
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}


# ─────────────────────────────────────────────────────────────────────────────
# TENANT SUBDOMAIN SERVER: *.coachingos.local → Next.js Web
# ─────────────────────────────────────────────────────────────────────────────
# Wildcard catch-all for tenant subdomains:
#   raju-coaching.coachingos.local → web:3001
#   brilliant-academy.coachingos.local → web:3001
#
# The Next.js app reads the subdomain from the Host header to resolve
# the institute and apply branding. Must be LAST server block to act
# as the default catch-all after specific subdomains are matched.
server {
    listen 443 ssl http2;
    listen 80;
    server_name *.coachingos.local;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Next.js tenant app
    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Pass the original Host header so Next.js can extract the subdomain
        proxy_set_header Host $host;

        # WebSocket support for Next.js HMR (dev) and real-time features
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Static assets with long cache
    location /_next/static/ {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
