# CoachingOS — Mosquitto MQTT Broker Configuration
# Used by RFID hardware readers (ESP32/Arduino) to publish card punch events

# Listener on default MQTT port
listener 1883
protocol mqtt

# Allow anonymous connections within Docker network
# In production, configure username/password authentication
allow_anonymous true

# Persistence for message durability
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all
